<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oriental IPS - Citas Escolares</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background-color: #f3f6f9; padding-top: 20px; }

    .card { border-radius: 12px; border: none; }
    .card-body { padding: 20px 25px; }

    table { background: white; border-radius: 12px; overflow: hidden; }
    thead.table-dark { background-color: #1a5632 !important; }

    .btn-primary { background-color: #1a5632; border-color: #1a5632; }
    .btn-outline-primary { border-color: #1a5632; color: #1a5632; }
    .btn-outline-primary:hover { background-color: #1a5632; color: white; }
  </style>
</head>
<body>
<div class="container">

  <!-- TOP BAR WITH LOGO + TITLE + REFRESH BUTTON -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center">
      <img src="/static/logo.png" alt="Logo Oriental IPS" style="height: 60px; margin-right: 15px;">
      <h2 class="m-0">Oriental IPS • Citas Escolares</h2>
    </div>

    <button id="refreshBtn" class="btn btn-outline-primary btn-sm">🔄 Refrescar</button>
  </div>

  <!-- SIMPLE TOTAL COUNT CARD -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body d-flex align-items-center">
      <h5 class="m-0">Total Citas: <strong id="total_count">0</strong></h5>
    </div>
  </div>

  <!-- SEARCH & FILTERS -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body">
      <div class="row g-2">
        <div class="col-md-5">
          <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nombre, colegio, paquete...">
        </div>
        <div class="col-md-4">
          <input type="date" id="dateFilter" class="form-control">
        </div>
        <div class="col-md-3">
          <button id="applyFilter" class="btn btn-primary w-100">Filtrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- APPOINTMENTS TABLE -->
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center" style="background-color:#1a5632; color:white;">
      <span>📅 Citas Próximas</span>
      <a href="/api/reservations" class="btn btn-sm btn-outline-light">Exportar CSV</a>
    </div>

    <div class="card-body">
      <table class="table table-hover">
        <thead class="table-dark">
          <tr>
            <th>Fecha & Hora</th>
            <th>Estudiante</th>
            <th>Colegio</th>
            <th>Paquete</th>
            <th>Edad</th>
            <th>ID</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="reservationsTableBody">
          <tr><td colspan="7" class="text-center">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="mt-5 text-center text-muted">
    <p>Oriental IPS v3.4.0 • Bot de WhatsApp para exámenes médicos escolares</p>
  </footer>

</div>

<script>
  const API_URL = '/api/reservations';
  let reservations = [];

  async function loadReservations() {
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      reservations = data.reservations || [];
      renderTable();
      updateStats();
    } catch (err) {
      console.error("Error loading reservations:", err);
      document.getElementById('reservationsTableBody').innerHTML =
        `<tr><td colspan="7" class="text-center text-danger">❌ Error: ${err.message}</td></tr>`;
    }
  }

  function renderTable() {
    const tbody = document.getElementById('reservationsTableBody');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const dateFilter = document.getElementById('dateFilter').value;

    let filtered = reservations.filter(r => {
      const matchesSearch =
        r.customer_name.toLowerCase().includes(search) ||
        r.school_name.toLowerCase().includes(search) ||
        r.package.toLowerCase().includes(search);

      const matchesDate = !dateFilter || r.datetime.startsWith(dateFilter);
      return matchesSearch && matchesDate;
    });

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center">No hay citas que coincidan con los filtros.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(r => {
      // Parse "YYYY-MM-DD HH:MM" as LOCAL time
      function parseLocalDateTime(dateTimeStr) {
        const [datePart, timePart] = dateTimeStr.split(' ');
        const [year, month, day] = datePart.split('-').map(Number);
        const [hour, minute] = timePart.split(':').map(Number);
        return new Date(year, month - 1, day, hour, minute);
      }
    
      const dt = parseLocalDateTime(r.datetime);
      const localDt = dt.toLocaleString('es-CO', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
      });
    
      return `
        <tr>
          <td>${localDt}</td>
          <td>${r.customer_name}</td>
          <td>${r.school_name}</td>
          <td>${r.package}</td>
          <td>${r.age}</td>
          <td>${r.cedula}</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary" onclick="copyId('${r.cedula}')">📋 Copiar ID</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function updateStats() {
    document.getElementById('total_count').textContent = reservations.length;
  }

  document.getElementById('refreshBtn').addEventListener('click', loadReservations);
  document.getElementById('applyFilter').addEventListener('click', renderTable);
  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('dateFilter').addEventListener('change', renderTable);

  function copyId(id) {
    navigator.clipboard.writeText(id);
    alert('ID copiado al portapapeles');
  }

  // Load on start
  loadReservations();
</script>

</body>
</html>
